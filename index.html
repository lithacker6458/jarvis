<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;overflow-x:hidden;}
body{color:#cce0f5;font-family:'Inter',-apple-system,sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,180,220,0.2);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes glow{0%,100%{text-shadow:0 0 6px rgba(0,212,255,0.3);}50%{text-shadow:0 0 20px rgba(0,212,255,0.9),0 0 40px rgba(0,212,255,0.4),0 0 80px rgba(0,212,255,0.15);}}
@keyframes scanDown{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
@keyframes arcPulse{0%,100%{opacity:0.15;}50%{opacity:0.4;}}
@keyframes listenRing{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.15);opacity:1;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;

const MODEL="claude-sonnet-4-20250514";
const GROUPS=[
  {label:"Core",    tickers:["NVDA","MU","AMSC"]},
  {label:"ETFs",    tickers:["SMH","QQQM","QQQ","MAGS"]},
  {label:"Thematic",tickers:["QTUM","NUKZ","SPGP"]},
];
const WMO={0:["Clear","☀️"],1:["Mainly Clear","🌤️"],2:["Partly Cloudy","⛅"],3:["Overcast","☁️"],
  45:["Foggy","🌫️"],51:["Drizzle","🌦️"],61:["Light Rain","🌧️"],63:["Rain","🌧️"],80:["Showers","🌦️"],95:["Thunderstorm","⛈️"]};
const getWMO=c=>WMO[c]||WMO[Math.floor(c/10)*10]||["—","🌡️"];

const JARVIS_SYSTEM=`You are JARVIS — the personal AI of Anish Kumar Boddu. British dry wit, sharp and concise. Genuinely invested in his success. Use "sir" naturally 2-3x per response. Plain text ONLY — no markdown, no asterisks, no bullet symbols. Output will be read aloud.

Anish: 20yo UTD sophomore, Finance BS Investment Concentration, May 2028. Runs Bubba's Fireworks seasonally. micro1 AI Evaluation Specialist. Active investor: NVDA MU AMSC SMH QQQM QQQ MAGS QTUM NUKZ SPGP. Fitness cut (~167 lbs). McKinney TX.`;

// ── UTILS ──────────────────────────────────────────────────────
const parseJSON=txt=>{try{const c=txt.replace(/```json|```/g,"").trim();const m=c.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);return m?JSON.parse(m[0]):null;}catch{return null;}};
const daysUntil=d=>{const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);};
const fmtCD=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

// ── VOICE ENGINE ───────────────────────────────────────────────
let _voice=null;
const initVoice=()=>new Promise(res=>{
  const pick=()=>{
    const v=speechSynthesis.getVoices();
    _voice=v.find(x=>x.name==="Daniel")||v.find(x=>x.lang==="en-GB"&&/male/i.test(x.name))||
           v.find(x=>x.lang==="en-GB")||v.find(x=>x.lang.startsWith("en"))||v[0];
    res();
  };
  speechSynthesis.getVoices().length?pick():( speechSynthesis.onvoiceschanged=pick );
});
const speak=(text,onEnd)=>{
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(_voice)u.voice=_voice;
  u.rate=0.88;u.pitch=0.82;u.volume=1;
  if(onEnd)u.onend=onEnd;
  speechSynthesis.speak(u);
};
const stopSpeaking=()=>speechSynthesis.cancel();

// ── API ─────────────────────────────────────────────────────────
const hdrs=key=>({
  "Content-Type":"application/json",
  "x-api-key":key,
  "anthropic-version":"2023-06-01",
  "anthropic-dangerous-direct-browser-access":"true"
});

async function callClaude(messages,system,key,extras={}){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:hdrs(key),
    body:JSON.stringify({model:MODEL,max_tokens:1000,system,messages,...extras})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status);}
  const d=await r.json();
  return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

async function webSearch(prompt,key,maxTokens=800){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:hdrs(key),
    body:JSON.stringify({
      model:MODEL,max_tokens:maxTokens,
      messages:[{role:"user",content:prompt}],
      tools:[{type:"web_search_20250305",name:"web_search"}]
    })
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status);}
  const d=await r.json();
  return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

// ── STYLES ──────────────────────────────────────────────────────
const C={
  card:{background:"#0a0a0a",border:"1px solid #1a2e3a",borderRadius:12,padding:12},
  label:{fontSize:9,fontWeight:700,letterSpacing:"1.8px",color:"#3db8d4",textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"},
  dim:{fontSize:11,color:"#1e3040",fontStyle:"italic"},
  pos:"#22c55e",neg:"#ef4444",
  mono:{fontFamily:"'JetBrains Mono',monospace"},
};

// ─────────────────────────────────────────────────────────────────
// SETUP SCREEN
// ─────────────────────────────────────────────────────────────────
function Setup({onSave}){
  const[key,setKey]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);

  const init=async()=>{
    if(!key.trim().startsWith("sk-")){setErr("Key must start with sk-");return;}
    setBusy(true);setErr("");
    try{
      await callClaude([{role:"user",content:"Say: Online."}],"You are JARVIS.",key.trim(),{max_tokens:10});
      onSave(key.trim());
    }catch(e){setErr("Connection failed — check your key at console.anthropic.com");}
    setBusy(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",padding:20}}>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}`}</style>
      <div style={{...C.card,maxWidth:420,width:"100%",padding:36,animation:"fadeUp .5s ease",borderColor:"#1a3a4a"}}>
        <div style={{fontSize:11,color:"#1a4050",letterSpacing:"4px",...C.mono,marginBottom:8}}>INITIALIZING</div>
        <div style={{fontSize:36,fontWeight:900,color:"#00d4ff",letterSpacing:14,...C.mono,marginBottom:4}}>JARVIS</div>
        <div style={{fontSize:9,color:"#1a3040",letterSpacing:"3px",marginBottom:32}}>PERSONAL AI · ANISH KUMAR BODDU</div>

        <div style={{fontSize:12,color:"#3a6080",lineHeight:"1.8",marginBottom:24}}>
          Enter your Anthropic API key to initialize. Stored locally on this device only — never transmitted elsewhere.
          <br/><span style={{color:"#1a3040",fontSize:11}}>console.anthropic.com → API Keys</span>
        </div>

        <input type="password" value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&init()}
          placeholder="sk-ant-api03-..." autoFocus
          style={{width:"100%",background:"#111",border:"1px solid #1a3a4a",borderRadius:8,padding:"11px 14px",color:"#cce0f5",fontSize:12,outline:"none",...C.mono,marginBottom:10}}/>

        {err&&<div style={{fontSize:11,color:"#ef4444",marginBottom:10}}>{err}</div>}

        <button onClick={init} disabled={busy}
          style={{width:"100%",background:"rgba(0,150,210,0.15)",border:"1px solid rgba(0,180,220,0.35)",borderRadius:8,color:"#00d4ff",padding:13,cursor:"pointer",fontSize:11,fontWeight:700,letterSpacing:"2px",opacity:busy?.6:1,fontFamily:"inherit"}}>
          {busy?"CONNECTING...":"INITIALIZE JARVIS"}
        </button>

        <div style={{fontSize:10,color:"#0d2030",marginTop:20,lineHeight:"1.6"}}>
          Your key is stored in localStorage. It only leaves your browser to call api.anthropic.com.
          Stocks, weather, news, and AI chat all use this key.
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// SPIN BUTTON
// ─────────────────────────────────────────────────────────────────
function Spin({onClick,spinning}){
  return<button onClick={onClick} title="Refresh" style={{background:"none",border:"none",color:"#3db8d4",cursor:"pointer",fontSize:15,padding:0,lineHeight:1,...C.mono,animation:spinning?"spin 1s linear infinite":"none",opacity:spinning?.4:.8}}>↺</button>;
}

// ─────────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────────
function Dashboard({apiKey,onReset}){
  const[time,setTime]=useState(new Date());
  const[weather,setWeather]=useState(null);
  const[stocks,setStocks]=useState({});
  const[stockTime,setStockTime]=useState(null);
  const[premarket,setPremarket]=useState(null);
  const[news,setNews]=useState(null);
  const[calendar,setCalendar]=useState(null);
  const[exams,setExams]=useState([]);
  const[driveNotes,setDriveNotes]=useState(null);
  const[spin,setSpin]=useState({w:true,s:true,n:true,c:true,e:true,d:true,p:true});
  const[nextRefresh,setNextRefresh]=useState(30*60);

  // Voice
  const[speaking,setSpeaking]=useState(false);
  const[listening,setListening]=useState(false);
  const[voiceHint,setVoiceHint]=useState("");
  const recRef=useRef(null);
  const clapRef=useRef({times:[],ctx:null,running:false});

  // Chat
  const[msgs,setMsgs]=useState([]);
  const[chatIn,setChatIn]=useState("");
  const[chatBusy,setChatBusy]=useState(false);
  const chatEnd=useRef(null);

  // Panels
  const[panel,setPanel]=useState("chat");
  const[brief,setBrief]=useState(null);
  const[briefBusy,setBriefBusy]=useState(false);

  // Notes/Todos
  const[userNotes,setUserNotes]=useState("");
  const[noteDraft,setNoteDraft]=useState("");
  const[noteOpen,setNoteOpen]=useState(false);
  const[todos,setTodos]=useState([]);
  const[todoIn,setTodoIn]=useState("");
  const todoRef=useRef(null);

  const go=k=>setSpin(p=>({...p,[k]:true}));
  const end=k=>setSpin(p=>({...p,[k]:false}));

  // ── INIT ──────────────────────────────────────────────────────
  useEffect(()=>{
    initVoice().then(()=>{
      const h=new Date().getHours();
      const line=h<12
        ?"Good morning, sir. All systems are online. Your dashboard is loading."
        :h<17?"Good afternoon, sir. Jarvis online and standing by."
        :"Good evening, sir. Systems are live. Ready when you are.";
      setSpeaking(true);
      speak(line,()=>setSpeaking(false));
      setMsgs([{role:"assistant",content:h<12?"Good morning, sir. Dashboard is loading — ask me anything.":h<17?"Good afternoon, sir. What can I do for you?":"Good evening, sir. Ready when you are."}]);
    });
    try{
      const t=localStorage.getItem("j-todos");if(t)setTodos(JSON.parse(t));
      const n=localStorage.getItem("j-notes");if(n){setUserNotes(n);setNoteDraft(n);}
    }catch{}
    setupClapDetection();
    return()=>{recRef.current?.stop();};
  },[]);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs,chatBusy]);

  // Auto-refresh
  useEffect(()=>{
    fetchAll();
    const r=setInterval(()=>{fetchAll();setNextRefresh(30*60);},30*60*1000);
    const t=setInterval(()=>setNextRefresh(p=>p>0?p-1:30*60),1000);
    return()=>{clearInterval(r);clearInterval(t);};
  },[]);

  // ── STORAGE ────────────────────────────────────────────────────
  const saveTodos=l=>{setTodos(l);try{localStorage.setItem("j-todos",JSON.stringify(l));}catch{}};
  const saveNotes=t=>{setUserNotes(t);try{localStorage.setItem("j-notes",t);}catch{}};
  const addTodo=()=>{const t=todoIn.trim();if(!t)return;saveTodos([...todos,{id:Date.now(),text:t,done:false}]);setTodoIn("");setTimeout(()=>todoRef.current?.focus(),0);};

  // ── CLAP DETECTION ─────────────────────────────────────────────
  const setupClapDetection=async()=>{
    if(clapRef.current.running)return;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      const ctx=new AudioContext();
      const src=ctx.createMediaStreamSource(stream);
      const analyser=ctx.createAnalyser();
      analyser.fftSize=512;
      src.connect(analyser);
      clapRef.current.ctx=ctx;
      clapRef.current.running=true;
      const buf=new Uint8Array(analyser.frequencyBinCount);
      let lastClap=0;
      const detect=()=>{
        if(!clapRef.current.running)return;
        analyser.getByteFrequencyData(buf);
        const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
        const now=Date.now();
        if(avg>90&&now-lastClap>180){
          lastClap=now;
          const times=[...clapRef.current.times.filter(t=>now-t<900),now];
          clapRef.current.times=times;
          if(times.length>=2){clapRef.current.times=[];onDoubleClap();}
        }
        requestAnimationFrame(detect);
      };
      detect();
    }catch{/* mic not available */}
  };

  const onDoubleClap=()=>{
    window.focus();
    setSpeaking(true);
    speak("Yes, sir? I'm listening.",()=>{setSpeaking(false);doListen();});
  };

  // ── VOICE I/O ──────────────────────────────────────────────────
  const doListen=()=>{
    if(!('SpeechRecognition' in window)&&!('webkitSpeechRecognition' in window))return;
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();rec.lang="en-US";rec.interimResults=false;rec.maxAlternatives=1;
    rec.onresult=e=>{const t=e.results[0][0].transcript;setVoiceHint(t);sendMsg(t,true);};
    rec.onend=()=>setListening(false);
    rec.onerror=()=>setListening(false);
    recRef.current=rec;setListening(true);rec.start();
  };
  const stopListening=()=>{recRef.current?.stop();setListening(false);};

  // ── FETCHERS ───────────────────────────────────────────────────
  const fetchWeather=useCallback(async()=>{
    go("w");
    try{
      const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.1984&longitude=-96.6398&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph");
      const d=await r.json();setWeather(d.current||null);
    }catch{}
    end("w");
  },[]);

  const fetchStocks=useCallback(async()=>{
    go("s");
    try{
      const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const[a,b]=await Promise.all([
        webSearch(`Today is ${now}. Search for current real-time stock prices and 1-day percent change for: NVDA, MU, AMSC, SMH, QQQM. Return ONLY a raw JSON array with no markdown: [{"ticker":"NVDA","price":220.00,"change":2.10,"pct":0.96}]. Use negative values for stocks that are down.`,apiKey),
        webSearch(`Today is ${now}. Search for current real-time stock prices and 1-day percent change for: QQQ, MAGS, QTUM, NUKZ, SPGP. Return ONLY a raw JSON array with no markdown: [{"ticker":"QQQ","price":450.00,"change":-1.20,"pct":-0.27}]. Use negative values for stocks that are down.`,apiKey),
      ]);
      const map={};
      [...(parseJSON(a)||[]),...(parseJSON(b)||[])].forEach(s=>{map[s.ticker]=s;});
      if(Object.keys(map).length>0){
        setStocks(map);
        setStockTime(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
      }
    }catch{}
    end("s");
  },[apiKey]);

  const fetchPremarket=useCallback(async()=>{
    go("p");
    try{
      const txt=await webSearch(`Search for current market data: ES S&P 500 futures price and percent change, NQ Nasdaq 100 futures price and percent change, and crude oil WTI price and percent change. Return ONLY raw JSON no markdown: {"futures":[{"name":"ES","value":5200,"change":12.5,"pct":0.24},{"name":"NQ","value":18500,"change":45,"pct":0.24}],"oil":{"value":78.50,"pct":-0.3}}`,apiKey,600);
      const p=parseJSON(txt);if(p&&Array.isArray(p.futures))setPremarket(p);
    }catch{}
    end("p");
  },[apiKey]);

  const fetchNews=useCallback(async()=>{
    go("n");
    try{
      const txt=await webSearch(`Search for today's top 6 financial market news headlines right now. Focus on AI, semiconductors, Fed, earnings, macro. Return ONLY a raw JSON array no markdown: [{"headline":"...","source":"Bloomberg","blurb":"one sentence summary of the story"}]`,apiKey);
      const p=parseJSON(txt);if(Array.isArray(p))setNews(p);
    }catch{}
    end("n");
  },[apiKey]);

  const fetchCalendar=useCallback(async()=>{
    go("c");
    try{
      const txt=await callClaude(
        [{role:"user",content:"List all my Google Calendar events from today through the next 14 days. Return ONLY raw JSON array no markdown: [{\"title\":\"Event Name\",\"date\":\"Tue May 13\",\"time\":\"2:00 PM\"}]. Max 12 events."}],
        "You are a calendar assistant with Google Calendar access.",
        apiKey,
        {mcp_servers:[{type:"url",url:"https://calendarmcp.googleapis.com/mcp/v1",name:"gcal"}],max_tokens:800}
      );
      const p=parseJSON(txt);setCalendar(Array.isArray(p)?p:[]);
    }catch{setCalendar([]);}
    end("c");
  },[apiKey]);

  const fetchExams=useCallback(async()=>{
    go("e");
    try{
      const txt=await callClaude(
        [{role:"user",content:"Search my Google Calendar for events in the next 60 days with 'exam', 'midterm', 'final', 'quiz', or 'test' in the title. Return ONLY raw JSON no markdown: [{\"name\":\"FIN 4300 Final\",\"date\":\"2026-05-14\"}]. Max 5 results."}],
        "You are a calendar assistant with Google Calendar access.",
        apiKey,
        {mcp_servers:[{type:"url",url:"https://calendarmcp.googleapis.com/mcp/v1",name:"gcal"}],max_tokens:400}
      );
      const p=parseJSON(txt);if(Array.isArray(p))setExams(p);
    }catch{}
    end("e");
  },[apiKey]);

  const fetchDrive=useCallback(async()=>{
    go("d");
    try{
      const txt=await callClaude(
        [{role:"user",content:"Search Google Drive for files named 'notes', 'thoughts', 'todo', or 'Jarvis Notes'. Read the most recent ones. Return ONLY raw JSON no markdown: [{\"title\":\"File Name\",\"bullets\":[\"key point 1\",\"key point 2\"]}]. Max 4 files, 5 bullets each."}],
        "You are a Google Drive assistant with Drive access.",
        apiKey,
        {mcp_servers:[{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"gdrive"}],max_tokens:600}
      );
      const p=parseJSON(txt);setDriveNotes(Array.isArray(p)?p:[]);
    }catch{setDriveNotes([]);}
    end("d");
  },[apiKey]);

  const fetchAll=useCallback(()=>{
    fetchWeather();fetchStocks();fetchPremarket();
    fetchNews();fetchCalendar();fetchExams();fetchDrive();
  },[fetchWeather,fetchStocks,fetchPremarket,fetchNews,fetchCalendar,fetchExams,fetchDrive]);

  // ── CHAT ───────────────────────────────────────────────────────
  const buildCtx=()=>{
    const parts=[JARVIS_SYSTEM,"\nLIVE DATA:"];
    if(weather){const wi=getWMO(weather.weather_code);parts.push(`Weather McKinney TX: ${Math.round(weather.temperature_2m)}°F ${wi[0]}, feels ${Math.round(weather.apparent_temperature)}°F`);}
    const sl=Object.values(stocks);
    if(sl.length)parts.push(`Portfolio 1D: ${sl.map(s=>`${s.ticker} ${Number(s.pct)>=0?"+":""}${Number(s.pct).toFixed(2)}%`).join(", ")}`);
    if(premarket?.futures?.length)parts.push(`Futures: ${premarket.futures.map(f=>`${f.name} ${Number(f.pct)>=0?"+":""}${Number(f.pct).toFixed(2)}%`).join(", ")}`);
    if(Array.isArray(calendar)&&calendar.length)parts.push(`Calendar: ${calendar.slice(0,5).map(e=>`${e.title} on ${e.date}${e.time?` at ${e.time}`:""}`).join("; ")}`);
    if(exams.length)parts.push(`Upcoming exams: ${exams.map(e=>`${e.name} in ${daysUntil(e.date)} days`).join("; ")}`);
    if(Array.isArray(news)&&news.length)parts.push(`Market news: ${news.map(n=>n.headline).join(" | ")}`);
    if(userNotes)parts.push(`Anish's personal notes: ${userNotes}`);
    return parts.join("\n");
  };

  const sendMsg=async(text,withVoice=false)=>{
    const txt=(text||chatIn).trim();
    if(!txt||chatBusy)return;
    const next=[...msgs,{role:"user",content:txt}];
    setMsgs(next);setChatIn("");setVoiceHint("");setChatBusy(true);
    try{
      const reply=await callClaude(next.map(m=>({role:m.role,content:m.content})),buildCtx(),apiKey);
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
      if(withVoice){setSpeaking(true);speak(reply,()=>setSpeaking(false));}
    }catch{
      setMsgs(p=>[...p,{role:"assistant",content:"Brief technical difficulty, sir. Please try again."}]);
    }
    setChatBusy(false);
  };

  const genBrief=async()=>{
    setBriefBusy(true);setBrief(null);
    try{
      const reply=await callClaude(
        [{role:"user",content:"Generate my morning briefing. Cover: any urgent exams or deadlines, portfolio performance today, one or two key market news items, and close with one sharp motivating line. Under 250 words. Plain text only, no markdown, no headers. Spoken-word style."}],
        buildCtx(),apiKey,
        {max_tokens:500,mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}]}
      );
      setBrief(reply);
      setSpeaking(true);speak(reply,()=>setSpeaking(false));
    }catch{setBrief("Encountered a difficulty, sir. Please try again.");}
    setBriefBusy(false);
  };

  // ── DERIVED ────────────────────────────────────────────────────
  const fmtTime=d=>d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const fmtDate=d=>d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const greet=()=>{const h=time.getHours();return h<12?"Good morning, sir":h<17?"Good afternoon, sir":"Good evening, sir";};
  const wInfo=weather?.weather_code!==undefined?getWMO(weather.weather_code):null;
  const stockList=Object.values(stocks).filter(s=>s.pct!=null);
  const best=stockList.length?stockList.reduce((a,b)=>Number(a.pct)>Number(b.pct)?a:b):null;
  const worst=stockList.length?stockList.reduce((a,b)=>Number(a.pct)<Number(b.pct)?a:b):null;
  const allRed=stockList.length>0&&stockList.every(s=>Number(s.pct)<0);
  const allGreen=stockList.length>0&&stockList.every(s=>Number(s.pct)>0);
  const EXAM_COLS=["#ef4444","#f59e0b","#8b5cf6","#06b6d4"];

  return(
    <div style={{background:"#000",minHeight:"100vh",color:"#cce0f5",fontFamily:"'Inter',-apple-system,sans-serif",padding:14,display:"flex",flexDirection:"column",gap:10,position:"relative"}}>
      <style>{`
        *{box-sizing:border-box;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        @keyframes glow{0%,100%{text-shadow:0 0 6px rgba(0,212,255,0.3);}50%{text-shadow:0 0 22px rgba(0,212,255,1),0 0 44px rgba(0,212,255,0.4);}}
        @keyframes listenPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4);}50%{box-shadow:0 0 0 8px rgba(34,197,94,0);}}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:rgba(0,160,220,0.18);border-radius:4px;}
        .msg{animation:fadeUp .15s ease;}
        input:focus,textarea:focus{outline:1px solid rgba(0,200,220,0.3)!important;}
        button:active{transform:scale(0.97);}
      `}</style>

      {/* ── HEADER */}
      <div style={{...C.card,display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:"#1a2e3a"}}>
        <div>
          <div style={{...C.mono,fontSize:26,fontWeight:800,color:"#00d4ff",letterSpacing:3,animation:speaking?"glow 1.2s ease infinite":"none"}}>{fmtTime(time)}</div>
          <div style={{fontSize:10,color:"#0f2030",marginTop:3,letterSpacing:"0.5px"}}>{fmtDate(time)}</div>
        </div>

        <div style={{textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,letterSpacing:14,color:"#00d4ff",...C.mono}}>JARVIS</div>
          <div style={{fontSize:9,color:"#0f2030",letterSpacing:"3px",marginTop:2}}>PERSONAL AI · UTD FINANCE · MCKINNEY TX</div>
          <div style={{height:16,marginTop:3,display:"flex",justifyContent:"center",alignItems:"center",gap:8}}>
            {speaking&&<span style={{fontSize:9,color:"#3db8d4",letterSpacing:"2px",...C.mono,animation:"pulse .8s ease infinite"}}>◉ SPEAKING</span>}
            {listening&&<span style={{fontSize:9,color:"#22c55e",letterSpacing:"2px",...C.mono,animation:"pulse .5s ease infinite"}}>◉ LISTENING</span>}
          </div>
        </div>

        <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <div style={{fontSize:14,fontWeight:600,color:"#90b8e0"}}>{greet()}</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>listening?stopListening():doListen()}
              style={{background:listening?"rgba(34,197,94,0.12)":"rgba(0,150,210,0.1)",border:`1px solid ${listening?"rgba(34,197,94,0.4)":"rgba(0,150,210,0.25)"}`,borderRadius:6,color:listening?"#22c55e":"#3db8d4",padding:"4px 10px",cursor:"pointer",fontSize:10,fontFamily:"inherit",animation:listening?"listenPulse 1.2s ease infinite":"none"}}>
              {listening?"⏹ Stop":"🎤 Voice"}
            </button>
            <button onClick={()=>{stopSpeaking();setSpeaking(false);}}
              style={{background:"rgba(0,150,210,0.08)",border:"1px solid rgba(0,150,210,0.2)",borderRadius:6,color:"#3db8d4",padding:"4px 8px",cursor:"pointer",fontSize:11}}>🔇</button>
          </div>
          <div style={{fontSize:9,color:"#0f2030",...C.mono}}>↻ {fmtCD(nextRefresh)}</div>
        </div>
      </div>

      {/* ── FUTURES STRIP */}
      <div style={{...C.card,padding:"8px 14px",display:"flex",alignItems:"center",gap:16,borderColor:"#141e28"}}>
        <span style={{...C.label,flexShrink:0}}>⚡ Futures</span>
        <Spin onClick={fetchPremarket} spinning={spin.p}/>
        {spin.p&&!premarket&&<span style={C.dim}>Loading futures...</span>}
        {premarket?.futures?.map((f,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{...C.mono,fontSize:11,fontWeight:700,color:"#c0d8f0"}}>{f.name}</span>
            <span style={{...C.mono,fontSize:10,color:"#2a3e50"}}>{Number(f.value||0).toLocaleString()}</span>
            <span style={{...C.mono,fontSize:10,fontWeight:700,color:Number(f.pct)>=0?C.pos:C.neg}}>{Number(f.pct)>=0?"+":""}{Number(f.pct||0).toFixed(2)}%</span>
          </div>
        ))}
        {premarket?.oil&&(
          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
            <span style={{fontSize:9,color:"#2a3e50"}}>🛢 OIL</span>
            <span style={{...C.mono,fontSize:10,fontWeight:700,color:Number(premarket.oil.pct)>=0?C.pos:C.neg}}>${premarket.oil.value} {Number(premarket.oil.pct)>=0?"+":""}{Number(premarket.oil.pct||0).toFixed(2)}%</span>
          </div>
        )}
      </div>

      {/* ── EXAM COUNTDOWNS */}
      {exams.length>0&&(
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {exams.map((e,i)=>{
            const d=daysUntil(e.date);
            const col=EXAM_COLS[i%EXAM_COLS.length];
            const label=d<0?"✓ Done":d===0?"TODAY ⚠️":d===1?"Tomorrow":`${d} days`;
            const urgent=d>=0&&d<=2;
            return(
              <div key={i} style={{flex:1,...C.card,padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${col}`,borderRadius:10}}>
                <span style={{fontSize:11,fontWeight:600,color:"#80a0c0"}}>{e.name}</span>
                <span style={{...C.mono,fontSize:12,fontWeight:800,color:urgent?col:"#405060"}}>{label}</span>
              </div>
            );
          })}
          <Spin onClick={fetchExams} spinning={spin.e}/>
        </div>
      )}

      {/* ── MARKET SUMMARY BAR */}
      {stockList.length>0&&(
        <div style={{...C.card,padding:"8px 14px",display:"flex",alignItems:"center",gap:16,borderColor:"#141e28"}}>
          <span style={{...C.label,flexShrink:0}}>Today's Market</span>
          <span style={{fontSize:11,fontWeight:700,color:allRed?"#ef4444":allGreen?"#22c55e":"#d0a020"}}>
            {allRed?"🔴 Red day":allGreen?"🟢 Green day":"🟡 Mixed"}
          </span>
          {best&&<span style={{...C.mono,fontSize:11,fontWeight:700,color:C.pos}}>▲ {best.ticker} +{Number(best.pct).toFixed(2)}%</span>}
          {worst&&<span style={{...C.mono,fontSize:11,fontWeight:700,color:C.neg}}>▼ {worst.ticker} {Number(worst.pct).toFixed(2)}%</span>}
          {stockTime&&<span style={{fontSize:9,color:"#0f2030",...C.mono,marginLeft:"auto"}}>Updated {stockTime}</span>}
        </div>
      )}

      {/* ── MAIN GRID */}
      <div style={{display:"grid",gridTemplateColumns:"196px 1fr 196px",gap:10,flex:1,minHeight:0}}>

        {/* LEFT COLUMN */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

          {/* Weather */}
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={C.label}>🌡 McKinney TX</span>
              <Spin onClick={fetchWeather} spinning={spin.w}/>
            </div>
            {weather?(
              <>
                <div style={{...C.mono,fontSize:36,fontWeight:800,color:"#00d4ff",lineHeight:1}}>{Math.round(weather.temperature_2m)}°F</div>
                {wInfo&&<div style={{fontSize:13,marginTop:6,color:"#70a0c0"}}>{wInfo[1]} {wInfo[0]}</div>}
                <div style={{fontSize:10,color:"#1a2e40",marginTop:6}}>Feels {Math.round(weather.apparent_temperature)}°F · Wind {Math.round(weather.wind_speed_10m)} mph</div>
              </>
            ):<div style={C.dim}>{spin.w?"Loading...":"—"}</div>}
          </div>

          {/* Tasks */}
          <div style={{...C.card,flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <div style={{...C.label,marginBottom:8}}>📋 Tasks</div>
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              <input ref={todoRef} value={todoIn} onChange={e=>setTodoIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTodo()} placeholder="Add task..."
                style={{flex:1,background:"#111",border:"1px solid #1a2e3a",borderRadius:6,padding:"5px 8px",color:"#cce0f5",fontSize:11,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={addTodo} style={{background:"#0a1e2e",border:"1px solid #1a3a5a",borderRadius:6,color:"#00d4ff",padding:"5px 10px",cursor:"pointer",fontSize:16,...C.mono}}>+</button>
            </div>
            <div style={{overflowY:"auto",flex:1}}>
              {todos.length===0&&<div style={C.dim}>No tasks yet</div>}
              {todos.map((t,i)=>(
                <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"4px 0",borderBottom:i<todos.length-1?"1px solid #0d1520":"none"}}>
                  <input type="checkbox" checked={t.done} onChange={()=>saveTodos(todos.map(x=>x.id===t.id?{...x,done:!x.done}:x))} style={{cursor:"pointer",accentColor:"#00d4ff",marginTop:2,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:11,color:t.done?"#1a2530":"#90b8d8",textDecoration:t.done?"line-through":"none",lineHeight:"1.4"}}>{t.text}</span>
                  <button onClick={()=>saveTodos(todos.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:"#1a1010",cursor:"pointer",fontSize:14,padding:0,flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
          </div>

          {/* Thoughts */}
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:noteOpen?8:0}}>
              <span style={C.label}>💭 Thoughts</span>
              <button onClick={()=>setNoteOpen(o=>!o)} style={{background:"none",border:"none",color:"#3db8d4",cursor:"pointer",fontSize:10,padding:0,fontFamily:"inherit"}}>{noteOpen?"▲ done":"▼ edit"}</button>
            </div>
            {noteOpen?(
              <>
                <textarea value={noteDraft} onChange={e=>setNoteDraft(e.target.value)} placeholder="Write thoughts — Jarvis reads these..."
                  style={{width:"100%",height:68,background:"#111",border:"1px solid #1a2e3a",borderRadius:6,padding:"6px 8px",color:"#cce0f5",fontSize:11,outline:"none",resize:"none",fontFamily:"inherit",lineHeight:"1.5"}}/>
                <button onClick={()=>{saveNotes(noteDraft);setNoteOpen(false);}}
                  style={{marginTop:5,width:"100%",background:"rgba(0,150,210,0.1)",border:"1px solid rgba(0,150,210,0.25)",borderRadius:6,color:"#00d4ff",padding:5,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>Save to Jarvis</button>
              </>
            ):(
              <div style={{fontSize:11,color:"#3a5870",lineHeight:"1.5",maxHeight:52,overflow:"hidden"}}>
                {userNotes||<span style={C.dim}>Tap edit — Jarvis reads these</span>}
              </div>
            )}
          </div>
        </div>

        {/* CENTER PANEL */}
        <div style={{...C.card,padding:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",borderBottom:"1px solid #1a2e3a",flexShrink:0}}>
            {[["chat","💬 Chat with Jarvis"],["briefing","📋 Morning Brief"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>{setPanel(id);if(id==="briefing"&&!brief&&!briefBusy)genBrief();}}
                style={{flex:1,padding:11,background:panel===id?"#0d1a22":"none",border:"none",borderBottom:panel===id?"2px solid #00d4ff":"2px solid transparent",color:panel===id?"#00d4ff":"#2a4060",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:"inherit"}}>
                {lbl}
              </button>
            ))}
          </div>

          {panel==="chat"&&(
            <>
              <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
                {msgs.map((m,i)=>(
                  <div key={i} className="msg" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"82%",padding:"9px 13px",fontSize:12,lineHeight:"1.65",whiteSpace:"pre-wrap",
                      borderRadius:m.role==="user"?"12px 12px 2px 12px":"2px 12px 12px 12px",
                      background:m.role==="user"?"rgba(0,150,210,0.16)":"#111",
                      border:m.role==="user"?"1px solid rgba(0,150,210,0.28)":"1px solid #1a2e3a",
                      color:m.role==="user"?"#b8d8f8":"#8ab0cc"}}>
                      {m.content}
                    </div>
                  </div>
                ))}
                {chatBusy&&(
                  <div style={{display:"flex"}}>
                    <div style={{padding:"9px 14px",borderRadius:"2px 12px 12px 12px",background:"#111",border:"1px solid #1a2e3a",color:"#3db8d4",fontSize:12,...C.mono}}>
                      <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>◌</span>&nbsp; Thinking...
                    </div>
                  </div>
                )}
                <div ref={chatEnd}/>
              </div>

              {msgs.length<=1&&(
                <div style={{padding:"0 14px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["How's my portfolio today?","What's moving in semis?","What's on my calendar?","Summarize my emails"].map(p=>(
                    <button key={p} onClick={()=>sendMsg(p)}
                      style={{background:"rgba(0,150,210,0.08)",border:"1px solid rgba(0,150,210,0.2)",borderRadius:6,color:"#3a7090",padding:"4px 10px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>
                      {p}
                    </button>
                  ))}
                </div>
              )}

              <div style={{padding:"10px 14px",borderTop:"1px solid #1a2e3a",display:"flex",gap:8,flexShrink:0}}>
                <input value={chatIn||voiceHint} onChange={e=>{setChatIn(e.target.value);setVoiceHint("");}}
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()} placeholder="Ask Jarvis anything... (Enter to send)" disabled={chatBusy}
                  style={{flex:1,background:"#111",border:"1px solid #1a2e3a",borderRadius:8,padding:"9px 12px",color:"#cce0f5",fontSize:12,outline:"none",fontFamily:"inherit",opacity:chatBusy?.6:1}}/>
                <button onClick={()=>listening?stopListening():doListen()}
                  style={{background:listening?"rgba(34,197,94,0.12)":"rgba(0,150,210,0.08)",border:`1px solid ${listening?"rgba(34,197,94,0.4)":"rgba(0,150,210,0.2)"}`,borderRadius:8,color:listening?"#22c55e":"#3db8d4",padding:"9px 11px",cursor:"pointer",fontSize:14,animation:listening?"listenPulse 1.2s ease infinite":"none"}}>🎤</button>
                <button onClick={()=>sendMsg()} disabled={chatBusy}
                  style={{background:"rgba(0,150,210,0.16)",border:"1px solid rgba(0,150,210,0.32)",borderRadius:8,color:"#00d4ff",padding:"9px 14px",cursor:"pointer",fontSize:14,opacity:chatBusy?.5:1}}>➤</button>
              </div>
            </>
          )}

          {panel==="briefing"&&(
            <div style={{flex:1,overflowY:"auto",padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <span style={{fontSize:10,color:"#1a2e3a",...C.mono}}>{fmtDate(time)}</span>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{if(brief){setSpeaking(true);speak(brief,()=>setSpeaking(false));}}} disabled={!brief||speaking}
                    style={{background:"rgba(0,150,210,0.08)",border:"1px solid rgba(0,150,210,0.2)",borderRadius:6,color:"#3db8d4",padding:"4px 10px",cursor:"pointer",fontSize:10,opacity:!brief||speaking?.4:1}}>🔊 Play</button>
                  <button onClick={genBrief} disabled={briefBusy}
                    style={{background:"rgba(0,150,210,0.1)",border:"1px solid rgba(0,150,210,0.25)",borderRadius:6,color:"#00d4ff",padding:"4px 12px",cursor:"pointer",fontSize:10,opacity:briefBusy?.5:1}}>
                    {briefBusy?"Generating...":"↺ New Briefing"}
                  </button>
                </div>
              </div>
              {briefBusy&&<div style={C.dim}>Jarvis is preparing your briefing, sir...</div>}
              {brief&&<div style={{fontSize:13,lineHeight:"1.9",color:"#7aa0c0",whiteSpace:"pre-wrap"}}>{brief}</div>}
              {!brief&&!briefBusy&&<div style={C.dim}>Opening briefing...</div>}
            </div>
          )}
        </div>

        {/* RIGHT COLUMN */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

          {/* Portfolio */}
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={C.label}>📈 Portfolio · 1D</span>
              <Spin onClick={fetchStocks} spinning={spin.s}/>
            </div>
            {GROUPS.map(g=>(
              <div key={g.label} style={{marginBottom:10}}>
                <div style={{fontSize:8,color:"#1a2e3a",letterSpacing:"1.5px",textTransform:"uppercase",...C.mono,marginBottom:4,paddingBottom:3,borderBottom:"1px solid #0d1820"}}>{g.label}</div>
                {g.tickers.map(ticker=>{
                  const s=stocks[ticker];
                  const pos=s?Number(s.pct)>=0:null;
                  const col=pos===null?"#1e3040":pos?C.pos:C.neg;
                  return(
                    <div key={ticker} style={{display:"grid",gridTemplateColumns:"auto 1fr auto",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"1px solid #080e16"}}>
                      <span style={{...C.mono,fontWeight:700,fontSize:11,color:"#c8e0f8"}}>{ticker}</span>
                      {s?(
                        <div style={{width:"100%",height:2,background:"#0d1620",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(Math.abs(Number(s.pct))*8,100)}%`,background:col,borderRadius:2,transition:"width .3s ease"}}/>
                        </div>
                      ):<div/>}
                      <div style={{textAlign:"right"}}>
                        {s?(
                          <>
                            <div style={{...C.mono,fontSize:9,color:"#304050"}}>${Number(s.price).toFixed(2)}</div>
                            <div style={{...C.mono,fontSize:10,fontWeight:700,color:col}}>{pos?"+":""}{Number(s.pct).toFixed(2)}%</div>
                          </>
                        ):<span style={{fontSize:10,color:"#1a2e3a"}}>—</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
            {spin.s&&!Object.keys(stocks).length&&<div style={C.dim}>Fetching prices...</div>}
          </div>

          {/* Calendar */}
          <div style={C.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={C.label}>📅 Calendar</span>
              <Spin onClick={fetchCalendar} spinning={spin.c}/>
            </div>
            {Array.isArray(calendar)?calendar.length>0?calendar.map((e,i)=>(
              <div key={i} style={{padding:"5px 0",borderBottom:i<calendar.length-1?"1px solid #0d1820":"none"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#9ab8d8",lineHeight:"1.35"}}>{e.title}</div>
                <div style={{fontSize:9,color:"#007898",...C.mono,marginTop:2}}>{e.date}{e.time?` · ${e.time}`:""}</div>
              </div>
            )):<div style={C.dim}>No upcoming events</div>
            :<div style={C.dim}>{spin.c?"Loading...":"—"}</div>}
          </div>

          {/* Drive Notes */}
          <div style={{...C.card,flex:1,overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={C.label}>📝 Drive Notes</span>
              <Spin onClick={fetchDrive} spinning={spin.d}/>
            </div>
            <div style={{overflowY:"auto",flex:1}}>
              {Array.isArray(driveNotes)?driveNotes.length>0?driveNotes.map((n,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#007898",letterSpacing:"1px",textTransform:"uppercase",...C.mono,marginBottom:4}}>{n.title}</div>
                  {(n.bullets||[]).map((b,j)=>(
                    <div key={j} style={{fontSize:10,color:"#2a4050",padding:"2px 0 2px 8px",borderLeft:"2px solid #0d1e2a",marginBottom:3,lineHeight:"1.4"}}>{b}</div>
                  ))}
                </div>
              )):<div style={C.dim}>Create a "Jarvis Notes" doc in Drive</div>
              :<div style={C.dim}>{spin.d?"Scanning Drive...":"—"}</div>}
            </div>
          </div>
        </div>
      </div>

      {/* ── NEWS */}
      <div style={C.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={C.label}>📰 Market News</span>
          <Spin onClick={fetchNews} spinning={spin.n}/>
        </div>
        {Array.isArray(news)?(
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {news.slice(0,6).map((n,i)=>(
              <div key={i} style={{background:"#080808",border:"1px solid #111e28",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#e0ecf8",lineHeight:"1.4",marginBottom:5}}>{n.headline}</div>
                <div style={{fontSize:9,color:"#1a2e3a",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",...C.mono,marginBottom:4}}>{n.source}</div>
                {n.blurb&&<div style={{fontSize:10,color:"#2a4050",lineHeight:"1.45"}}>{n.blurb}</div>}
              </div>
            ))}
          </div>
        ):<div style={C.dim}>{spin.n?"Searching headlines...":"—"}</div>}
      </div>

      {/* ── FOOTER */}
      <div style={{textAlign:"center",fontSize:9,color:"#0a1820",paddingBottom:2,...C.mono}}>
        JARVIS v2.0 · Double-clap to wake · Auto-refreshes every 30 min ·&nbsp;
        <button onClick={onReset} style={{background:"none",border:"none",color:"#0a1820",cursor:"pointer",fontSize:9,...C.mono,textDecoration:"underline"}}>reset API key</button>
      </div>
    </div>
  );
}

// ── APP ROOT ────────────────────────────────────────────────────
function App(){
  const[key,setKey]=useState(()=>{try{return localStorage.getItem("j-key")||"";}catch{return "";}});
  if(!key)return<Setup onSave={k=>{try{localStorage.setItem("j-key",k);}catch{}setKey(k);}}/>;
  return<Dashboard apiKey={key} onReset={()=>{try{localStorage.removeItem("j-key");}catch{}setKey("");}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
